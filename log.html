<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コナン映画メモ帳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c14; --card: #12151f; --border: #1e2535;
    --accent: #c8a84b; --accent-dim: #8a6e28;
    --text: #e8e0d0; --text-dim: #7a7560;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .wrap { max-width: 780px; margin: 0 auto; padding: 0 16px 60px; }

  /* Header */
  .header { text-align: center; padding: 36px 0 24px; }
  .header-sub { font-size: 9px; letter-spacing: 6px; color: var(--accent-dim); font-family: 'Cinzel', serif; margin-bottom: 8px; }
  .header-title { font-size: 28px; font-family: 'Cinzel', serif; color: var(--accent); letter-spacing: 2px; text-shadow: 0 0 30px rgba(200,168,75,0.3); }
  .header-line { width: 60px; height: 1px; background: linear-gradient(to right, transparent, var(--accent-dim), transparent); margin: 14px auto 0; }

  /* Card */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; }

  /* User section */
  .section-label { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; }
  .section-hint { font-size: 9px; color: var(--accent-dim); }
  .user-label-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
  .user-buttons { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .user-btn {
    padding: 6px 16px; border-radius: 20px; font-size: 12px; cursor: pointer;
    border: 1px solid var(--border); background: transparent; color: var(--text-dim);
    transition: all 0.15s; font-family: 'Noto Sans JP', sans-serif; user-select: none;
  }
  .user-btn.active { border-color: var(--accent); background: rgba(200,168,75,0.15); color: var(--accent); }
  .user-btn:hover { border-color: var(--accent-dim); color: var(--text); }
  .add-btn {
    padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer;
    border: 1px dashed var(--border); background: transparent; color: var(--text-dim);
    font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s;
  }
  .add-btn:hover { border-color: var(--accent-dim); color: var(--text); }
  .user-input-row { display: flex; gap: 6px; align-items: center; }
  .name-input {
    background: var(--bg); border: 1px solid var(--accent); border-radius: 20px;
    color: var(--text); font-size: 12px; padding: 6px 12px; outline: none; width: 120px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .confirm-btn {
    background: var(--accent); border: none; border-radius: 20px; color: #0a0c14;
    font-size: 11px; font-weight: bold; padding: 6px 12px; cursor: pointer;
  }
  .cancel-btn {
    background: none; border: 1px solid var(--border); border-radius: 20px;
    color: var(--text-dim); font-size: 11px; padding: 6px 10px; cursor: pointer;
  }

  /* Stats */
  .stats { display: flex; gap: 20px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .stat-label { font-size: 9px; color: var(--text-dim); margin-bottom: 2px; }
  .stat-value { font-size: 18px; font-weight: bold; color: var(--accent); font-family: monospace; }
  .stat-unit { font-size: 10px; color: var(--text-dim); margin-left: 2px; }

  /* Ranking */
  .ranking-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
  .ranking-toggle {
    width: 100%; background: none; border: none; cursor: pointer;
    padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
  }
  .ranking-toggle-left { display: flex; align-items: center; gap: 10px; }
  .ranking-badge {
    font-size: 10px; background: rgba(200,168,75,0.15); color: var(--accent-dim);
    border-radius: 10px; padding: 1px 8px; border: 1px solid var(--accent-dim);
  }
  .ranking-title { font-size: 11px; color: var(--text-dim); letter-spacing: 2px; font-family: 'Noto Sans JP', sans-serif; }
  .ranking-body { padding: 0 16px 16px; }
  .ranking-empty { text-align: center; color: var(--text-dim); padding: 24px 0; font-size: 12px; }
  .ranking-list { display: flex; flex-direction: column; gap: 6px; }
  .ranking-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: transparent;
  }
  .ranking-item.top { background: rgba(200,168,75,0.07); border-color: rgba(138,110,40,0.33); }
  .ranking-pos { width: 28px; text-align: center; font-family: monospace; color: var(--text-dim); flex-shrink: 0; }
  .ranking-info { flex: 1; min-width: 0; }
  .ranking-name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ranking-note { font-size: 10px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ranking-stars { display: flex; gap: 1px; flex-shrink: 0; }
  .ranking-star { font-size: 13px; }

  /* Search */
  .search-wrap { margin-bottom: 16px; }
  .search-input {
    width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 13px; padding: 10px 16px; outline: none;
    font-family: 'Noto Sans JP', sans-serif; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent-dim); }

  /* Movie list */
  .movie-list { display: flex; flex-direction: column; gap: 8px; }
  .movie-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; }
  .movie-card.open { border-color: var(--accent-dim); box-shadow: 0 0 20px rgba(200,168,75,0.12); }
  .movie-header {
    width: 100%; background: none; border: none; padding: 12px 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
  }
  .movie-header-left { display: flex; align-items: center; gap: 10px; }
  .movie-num {
    font-size: 10px; color: var(--accent-dim); font-family: monospace;
    border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px;
  }
  .movie-title { font-size: 13px; color: var(--text); font-weight: 500; }
  .movie-header-right { display: flex; align-items: center; gap: 8px; }
  .movie-stars-preview { font-size: 12px; color: var(--accent); }
  .movie-chevron { color: var(--text-dim); font-size: 12px; }

  /* Movie body */
  .movie-body { padding: 0 16px 16px; display: flex; gap: 20px; flex-wrap: wrap; }
  .movie-inputs { flex: 1; min-width: 200px; }
  .field-label { font-size: 10px; color: var(--text-dim); margin-bottom: 6px; }
  .field-group { margin-bottom: 12px; }

  /* Stars */
  .stars { display: flex; gap: 4px; }
  .star-btn { background: none; border: none; cursor: pointer; padding: 0; font-size: 22px; color: var(--border); transition: color 0.15s, transform 0.1s; line-height: 1; }
  .star-btn.active, .star-btn:hover { color: var(--accent); transform: scale(1.2); }

  /* Textarea */
  .note-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 12px; padding: 8px 10px; resize: vertical;
    font-family: 'Noto Sans JP', sans-serif; outline: none; transition: border-color 0.2s;
  }
  .note-input:focus { border-color: var(--accent-dim); }

  /* Slider */
  .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .slider-label { width: 80px; font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
  .slider-input { flex: 1; accent-color: var(--accent); cursor: pointer; height: 4px; }
  .slider-val { width: 20px; text-align: right; font-size: 13px; font-weight: bold; font-family: monospace; color: var(--text-dim); }
  .slider-val.nonzero { color: var(--accent); }

  /* Save button */
  .save-btn {
    background: var(--accent); border: none; border-radius: 6px; color: #0a0c14;
    font-weight: bold; font-size: 12px; padding: 8px 20px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; transition: opacity 0.15s;
  }
  .save-btn:hover { opacity: 0.8; }

  /* Radar chart */
  .radar-wrap { display: flex; align-items: center; justify-content: center; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #0a0c14; border-radius: 20px;
    padding: 10px 24px; font-weight: bold; font-size: 13px; z-index: 100;
    box-shadow: 0 4px 20px rgba(200,168,75,0.4); pointer-events: none;
    opacity: 0; transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }

  .no-results { text-align: center; color: var(--text-dim); padding: 40px; font-size: 13px; }
  .chevron-icon { color: var(--text-dim); font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="header-sub">DETECTIVE CONAN</div>
    <h1 class="header-title">映画メモ帳</h1>
    <div class="header-line"></div>
  </div>

  <!-- User section -->
  <div class="card" id="user-card">
    <div class="user-label-row">
      <span class="section-label">▸ ユーザー選択</span>
      <span class="section-hint">ダブルクリックで名前を変更</span>
    </div>
    <div class="user-buttons" id="user-buttons"></div>
    <div class="stats">
      <div>
        <div class="stat-label">視聴済み</div>
        <div class="stat-value" id="stat-watched">0<span class="stat-unit">/ 29</span></div>
      </div>
      <div>
        <div class="stat-label">平均評価</div>
        <div class="stat-value" id="stat-avg">-<span class="stat-unit"> ★</span></div>
      </div>
    </div>
  </div>

  <!-- Ranking -->
  <div class="ranking-card">
    <button class="ranking-toggle" id="ranking-toggle">
      <div class="ranking-toggle-left">
        <span style="font-size:14px;color:var(--accent)">🏆</span>
        <span class="ranking-title" id="ranking-title">自分 のランキング</span>
        <span class="ranking-badge" id="ranking-badge" style="display:none"></span>
      </div>
      <span class="chevron-icon" id="ranking-chevron">▲</span>
    </button>
    <div class="ranking-body" id="ranking-body"></div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <input class="search-input" id="search-input" placeholder="🔍 映画タイトルで検索..." oninput="renderMovies()">
  </div>

  <!-- Movie list -->
  <div class="movie-list" id="movie-list"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast">✓ 保存しました</div>

<script>
const MOVIES = [
  "時計じかけの摩天楼",    // 1997
  "14番目の標的",          // 1998
  "世紀末の魔術師",        // 1999
  "瞳の中の暗殺者",        // 2000
  "天国へのカウントダウン", // 2001
  "ベイカー街の亡霊",      // 2002
  "迷宮の十字路",          // 2003
  "銀翼の奇術師",          // 2004
  "水平線上の陰謀",        // 2005
  "探偵たちの鎮魂歌",      // 2006
  "紺碧の棺",              // 2007
  "戦慄の楽譜",            // 2008
  "漆黒の追跡者",          // 2009
  "天空の難破船",          // 2010
  "沈黙の15分",            // 2011
  "11人目のストライカー",   // 2012
  "絶海の探偵",            // 2013
  "異次元の狙撃手",        // 2014
  "業火の向日葵",          // 2015
  "純黒の悪夢",            // 2016
  "から紅の恋歌",          // 2017
  "ゼロの執行人",          // 2018
  "紺青の拳",              // 2019
  "緋色の弾丸",            // 2021
  "ハロウィンの花嫁",      // 2022
  "黒鉄の魚影",            // 2023
  "100万ドルの五稜星",     // 2024
  "隻眼の残像",            // 2025
  "ハイウェイの堕天使",    // 2026
];

const RADAR_KEYS = [
  { key: "mystery",   label: "ミステリー" },
  { key: "action",    label: "アクション" },
  { key: "romance",   label: "ラブコメ" },
  { key: "character", label: "キャラクター" },
  { key: "nostalgia", label: "思い出補正" },
];

// ── State ──────────────────────────────────────────
let users = JSON.parse(localStorage.getItem("conan-users") || '["自分","友人A","友人B","友人C"]');
let allData = JSON.parse(localStorage.getItem("conan-data") || "{}");
let activeUser = users[0];
let showRanking = true;
let editingUser = null;
let toastTimer = null;

function persist() {
  localStorage.setItem("conan-users", JSON.stringify(users));
  localStorage.setItem("conan-data", JSON.stringify(allData));
}

function userData() { return allData[activeUser] || {}; }

// ── Radar chart ────────────────────────────────────
function buildRadar(values, size = 180) {
  const cx = size / 2, cy = size / 2, r = size * 0.38, n = 5;
  const angle = i => Math.PI * 2 * i / n - Math.PI / 2;
  const pt = (i, s) => ({
    x: cx + r * s * Math.cos(angle(i)),
    y: cy + r * s * Math.sin(angle(i)),
  });
  const poly = s => Array.from({length:n}, (_,i) => { const p=pt(i,s); return `${p.x.toFixed(1)},${p.y.toFixed(1)}`; }).join(" ");
  const dataPoints = RADAR_KEYS.map((k,i) => {
    const v = Math.max(0, Math.min(5, values[k.key] || 0)) / 5;
    const p = pt(i, v);
    return `${p.x.toFixed(1)},${p.y.toFixed(1)}`;
  }).join(" ");

  const grids = [0.2,0.4,0.6,0.8,1].map(s =>
    `<polygon points="${poly(s)}" fill="none" stroke="${s===1?'#8a6e28':'#1e2535'}" stroke-width="${s===1?1.5:0.8}"/>`
  ).join("");

  const axes = Array.from({length:n}, (_,i) => {
    const p = pt(i,1);
    return `<line x1="${cx}" y1="${cy}" x2="${p.x.toFixed(1)}" y2="${p.y.toFixed(1)}" stroke="#1e2535" stroke-width="0.8"/>`;
  }).join("");

  const dots = RADAR_KEYS.map((k,i) => {
    const v = Math.max(0, Math.min(5, values[k.key] || 0)) / 5;
    const p = pt(i, v);
    return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="#c8a84b"/>`;
  }).join("");

  const labels = RADAR_KEYS.map((k,i) => {
    const p = pt(i, 1.28);
    return `<text x="${p.x.toFixed(1)}" y="${p.y.toFixed(1)}" text-anchor="middle" dominant-baseline="central" fill="#7a7560" font-size="10" font-family="'Noto Sans JP',sans-serif">${k.label}</text>`;
  }).join("");

  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    ${grids}${axes}
    <polygon points="${dataPoints}" fill="rgba(200,168,75,0.18)" stroke="#c8a84b" stroke-width="2"/>
    ${dots}${labels}
  </svg>`;
}

// ── Users ──────────────────────────────────────────
function renderUsers() {
  const container = document.getElementById("user-buttons");
  container.innerHTML = "";

  users.forEach(u => {
    if (editingUser === u) {
      const row = document.createElement("div");
      row.className = "user-input-row";
      row.innerHTML = `
        <input class="name-input" id="edit-input" value="${u}" maxlength="20">
        <button class="confirm-btn" onclick="confirmRename('${u}')">変更</button>
        <button class="cancel-btn" onclick="cancelEdit()">✕</button>
      `;
      container.appendChild(row);
      setTimeout(() => {
        const inp = document.getElementById("edit-input");
        if (inp) { inp.focus(); inp.select(); }
      }, 10);
    } else {
      const btn = document.createElement("button");
      btn.className = "user-btn" + (u === activeUser ? " active" : "");
      btn.textContent = "✎ " + u;
      btn.title = "ダブルクリックで名前を変更";
      btn.addEventListener("click", () => { activeUser = u; renderAll(); });
      btn.addEventListener("dblclick", () => { editingUser = u; renderUsers(); });
      container.appendChild(btn);
    }
  });

  // Add user button
  const addArea = document.createElement("div");
  addArea.id = "add-area";
  const addBtn = document.createElement("button");
  addBtn.className = "add-btn";
  addBtn.textContent = "＋ 追加";
  addBtn.onclick = () => showAddUser();
  addArea.appendChild(addBtn);
  container.appendChild(addArea);

  // Enter key on edit input
  setTimeout(() => {
    const inp = document.getElementById("edit-input");
    if (inp) {
      inp.addEventListener("keydown", e => {
        if (e.key === "Enter") confirmRename(editingUser);
        if (e.key === "Escape") cancelEdit();
      });
      inp.addEventListener("blur", () => { if (editingUser) confirmRename(editingUser); });
    }
  }, 20);
}

function showAddUser() {
  const addArea = document.getElementById("add-area");
  addArea.innerHTML = `
    <div class="user-input-row">
      <input class="name-input" id="new-user-input" placeholder="名前を入力" maxlength="20">
      <button class="confirm-btn" onclick="addUser()">追加</button>
      <button class="cancel-btn" onclick="renderUsers()">✕</button>
    </div>
  `;
  const inp = document.getElementById("new-user-input");
  inp.focus();
  inp.addEventListener("keydown", e => {
    if (e.key === "Enter") addUser();
    if (e.key === "Escape") renderUsers();
  });
}

function addUser() {
  const name = document.getElementById("new-user-input")?.value.trim();
  if (!name || users.includes(name)) return;
  users.push(name);
  activeUser = name;
  persist();
  renderAll();
}

function confirmRename(oldName) {
  const name = document.getElementById("edit-input")?.value.trim();
  editingUser = null;
  if (!name || (name !== oldName && users.includes(name))) { renderUsers(); return; }
  if (name !== oldName) {
    users = users.map(u => u === oldName ? name : u);
    if (allData[oldName]) { allData[name] = allData[oldName]; delete allData[oldName]; }
    if (activeUser === oldName) activeUser = name;
    persist();
  }
  renderAll();
}

function cancelEdit() { editingUser = null; renderUsers(); }

// ── Stats ──────────────────────────────────────────
function renderStats() {
  const ud = userData();
  const watched = MOVIES.filter(m => ud[m]?.star > 0).length;
  const total = MOVIES.reduce((s,m) => s + (ud[m]?.star || 0), 0);
  const avg = watched > 0 ? (total / watched).toFixed(1) : "-";
  document.getElementById("stat-watched").innerHTML = `${watched}<span class="stat-unit">/ ${MOVIES.length}</span>`;
  document.getElementById("stat-avg").innerHTML = `${avg}<span class="stat-unit"> ★</span>`;
}

// ── Ranking ────────────────────────────────────────
function renderRanking() {
  const ud = userData();
  const ranked = MOVIES
    .filter(m => ud[m]?.star > 0)
    .map(m => ({ movie: m, star: ud[m].star, note: ud[m].note || "" }))
    .sort((a,b) => b.star - a.star || MOVIES.indexOf(a.movie) - MOVIES.indexOf(b.movie));

  document.getElementById("ranking-title").textContent = `${activeUser} のランキング`;
  const badge = document.getElementById("ranking-badge");
  if (ranked.length > 0) { badge.style.display = ""; badge.textContent = `${ranked.length}作品`; }
  else badge.style.display = "none";

  document.getElementById("ranking-chevron").textContent = showRanking ? "▲" : "▼";

  const body = document.getElementById("ranking-body");
  body.style.display = showRanking ? "" : "none";

  if (!showRanking) return;

  if (ranked.length === 0) {
    body.innerHTML = `<div class="ranking-empty">まだ評価した映画がありません</div>`;
    return;
  }

  const medals = ["🥇","🥈","🥉"];
  body.innerHTML = `<div class="ranking-list">${
    ranked.map((item, idx) => {
      const pos = idx < 3 ? `<span style="font-size:16px">${medals[idx]}</span>` : `<span style="font-size:11px">${idx+1}</span>`;
      const stars = [1,2,3,4,5].map(s => `<span class="ranking-star" style="color:${s<=item.star?'#c8a84b':'#1e2535'}">★</span>`).join("");
      const note = item.note ? `<div class="ranking-note">${escHtml(item.note)}</div>` : "";
      return `<div class="ranking-item${idx<3?' top':''}">
        <div class="ranking-pos">${pos}</div>
        <div class="ranking-info">
          <div class="ranking-name" style="color:${idx<3?'#e8e0d0':'#7a7560'};font-weight:${idx<3?500:400}">${escHtml(item.movie)}</div>
          ${note}
        </div>
        <div class="ranking-stars">${stars}</div>
      </div>`;
    }).join("")
  }</div>`;
}

document.getElementById("ranking-toggle").addEventListener("click", () => {
  showRanking = !showRanking;
  renderRanking();
});

// ── Movies ─────────────────────────────────────────
const openCards = new Set(); // track which cards are open

function renderMovies() {
  const search = document.getElementById("search-input").value;
  const ud = userData();
  const filtered = MOVIES.filter(m => m.includes(search));
  const list = document.getElementById("movie-list");

  if (filtered.length === 0) {
    list.innerHTML = `<div class="no-results">該当する映画が見つかりませんでした</div>`;
    return;
  }

  list.innerHTML = filtered.map((movie, fi) => {
    const idx = MOVIES.indexOf(movie);
    const memo = ud[movie] || { star:0, note:"", mystery:0, action:0, romance:0, character:0, nostalgia:0 };
    const hasData = memo.star > 0 || memo.note || RADAR_KEYS.some(k => memo[k.key] > 0);
    const isOpen = openCards.has(movie);
    const starsPreview = hasData && memo.star > 0 ? `<span class="movie-stars-preview">${"★".repeat(memo.star)}</span>` : "";

    const bodyHtml = isOpen ? buildMovieBody(movie, memo) : "";

    return `<div class="movie-card${isOpen?' open':''}" id="card-${idx}">
      <button class="movie-header" onclick="toggleCard('${escAttr(movie)}')">
        <div class="movie-header-left">
          <span class="movie-num">${String(idx+1).padStart(2,"0")}</span>
          <span class="movie-title">${escHtml(movie)}</span>
        </div>
        <div class="movie-header-right">
          ${starsPreview}
          <span class="movie-chevron">${isOpen?"▲":"▼"}</span>
        </div>
      </button>
      ${bodyHtml}
    </div>`;
  }).join("");
}

function buildMovieBody(movie, memo) {
  const sliders = RADAR_KEYS.map(k => `
    <div class="slider-row">
      <span class="slider-label">${k.label}</span>
      <input type="range" class="slider-input" min="0" max="5" step="1" value="${memo[k.key]||0}"
        oninput="updateDraft('${escAttr(movie)}','${k.key}',this.value)">
      <span class="slider-val${(memo[k.key]||0)>0?' nonzero':''}" id="sv-${escAttr(movie)}-${k.key}">${memo[k.key]||0}</span>
    </div>`).join("");

  const stars = [1,2,3,4,5].map(s => `
    <button class="star-btn${s<=(memo.star||0)?' active':''}" id="star-${escAttr(movie)}-${s}"
      onclick="setStar('${escAttr(movie)}',${s})" onmouseenter="hoverStar('${escAttr(movie)}',${s})" onmouseleave="unhoverStar('${escAttr(movie)}')">★</button>
  `).join("");

  return `<div class="movie-body">
    <div class="movie-inputs">
      <div class="field-group">
        <div class="field-label">総合評価</div>
        <div class="stars" id="stars-${escAttr(movie)}">${stars}</div>
      </div>
      <div class="field-group">
        <div class="field-label">感想メモ</div>
        <textarea class="note-input" rows="3" placeholder="感想を書いてね..."
          oninput="updateDraft('${escAttr(movie)}','note',this.value)">${escHtml(memo.note||"")}</textarea>
      </div>
      <div class="field-group">${sliders}</div>
      <button class="save-btn" onclick="saveMemo('${escAttr(movie)}')">保存する</button>
    </div>
    <div class="radar-wrap" id="radar-${escAttr(movie)}">${buildRadar(memo)}</div>
  </div>`;
}

// Draft state (in-memory, per open card)
const drafts = {};

function getDraft(movie) {
  const ud = userData();
  if (!drafts[movie]) {
    const saved = ud[movie] || { star:0, note:"", mystery:0, action:0, romance:0, character:0, nostalgia:0 };
    drafts[movie] = { ...saved };
  }
  return drafts[movie];
}

function toggleCard(movie) {
  if (openCards.has(movie)) {
    openCards.delete(movie);
    delete drafts[movie];
  } else {
    openCards.add(movie);
    const ud = userData();
    drafts[movie] = { ...(ud[movie] || { star:0, note:"", mystery:0, action:0, romance:0, character:0, nostalgia:0 }) };
  }
  renderMovies();
}

function updateDraft(movie, key, value) {
  const d = getDraft(movie);
  d[key] = (key === "note") ? value : Number(value);
  // update slider val display
  if (key !== "note") {
    const el = document.getElementById(`sv-${movie}-${key}`);
    if (el) { el.textContent = d[key]; el.className = "slider-val" + (d[key]>0?" nonzero":""); }
  }
  // update radar
  const radarEl = document.getElementById(`radar-${movie}`);
  if (radarEl) radarEl.innerHTML = buildRadar(d);
}

function setStar(movie, s) {
  const d = getDraft(movie);
  d.star = (d.star === s) ? 0 : s;
  updateStarUI(movie, d.star);
}

function hoverStar(movie, s) {
  for (let i=1;i<=5;i++) {
    const el = document.getElementById(`star-${movie}-${i}`);
    if (el) el.style.color = i<=s ? "#c8a84b" : "#1e2535";
  }
}

function unhoverStar(movie) {
  const d = getDraft(movie);
  updateStarUI(movie, d.star);
}

function updateStarUI(movie, val) {
  for (let i=1;i<=5;i++) {
    const el = document.getElementById(`star-${movie}-${i}`);
    if (el) { el.style.color = i<=val ? "#c8a84b" : "#1e2535"; }
  }
}

function saveMemo(movie) {
  const d = getDraft(movie);
  if (!allData[activeUser]) allData[activeUser] = {};
  allData[activeUser][movie] = { ...d };
  persist();
  showToast();
  renderStats();
  renderRanking();
  // update header stars preview without full re-render
  const idx = MOVIES.indexOf(movie);
  const card = document.getElementById(`card-${idx}`);
  if (card) {
    const prev = card.querySelector(".movie-stars-preview");
    const right = card.querySelector(".movie-header-right");
    if (d.star > 0) {
      if (prev) prev.textContent = "★".repeat(d.star);
      else { const sp = document.createElement("span"); sp.className="movie-stars-preview"; sp.textContent="★".repeat(d.star); right.insertBefore(sp, right.firstChild); }
    } else if (prev) prev.remove();
  }
}

// ── Toast ──────────────────────────────────────────
function showToast() {
  const t = document.getElementById("toast");
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
}

// ── Helpers ────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function escAttr(s) { return s.replace(/'/g,"\\'"); }

// ── Full render ────────────────────────────────────
function renderAll() {
  renderUsers();
  renderStats();
  renderRanking();
  renderMovies();
}

renderAll();
</script>
</body>
</html>
